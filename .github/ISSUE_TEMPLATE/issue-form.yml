name: '📝 작업 이슈'
description: '작업 단위를 정의합니다.'
labels: []
title: '[feat] 작업 내용을 작성해주세요'

body:
  - type: dropdown
    id: type
    attributes:
      label: '📌 작업 유형'
      options:
        - feat (기능 추가)
        - fix (버그 수정)
        - refactor (리팩토링)
        - docs (문서 수정)
        - chore (기타 작업)
    validations:
      required: true

  - type: input
    id: summary
    attributes:
      label: '📝 작업 내용'
      placeholder: '예: 로그인 기능 구현'
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: '📖 상세 설명'
      description: '필요한 경우 작성해주세요'
      placeholder: '구현 배경, 요구사항 등'
    validations:
      required: false

  - type: textarea
    id: tasks
    attributes:
      label: '✅ 작업 목록'
      value: |
        - [ ] 기능 구현
        - [ ] 테스트 코드 작성
        - [ ] 예외 처리
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ### 🌳 브랜치 규칙
        feat/#이슈번호-설명  
        예: feat/23-login

        ### 💬 PR 규칙
        feat: 로그인 기능 구현 (#23)